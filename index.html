      function formatNumber(num) {

        return (num / 100000000).toFixed(1) + "억";

        return (Math.floor((num / 100000000) * 10) / 10).toFixed(1) + "억";

      function hashCode(str) {
        let h = 0;
        for (let i = 0; i < str.length; i++) {
          h = (h << 5) - h + str.charCodeAt(i);
          h |= 0;
        }
        return Math.abs(h);
      }

      function pseudoRandom(seed) {
        const x = Math.sin(seed) * 10000;
        return x - Math.floor(x);
      }

      function EChart({ option, height = 420, onClick = null }) {
        const chartRef = useRef(null);

        useEffect(() => {
          if (!chartRef.current || !window.echarts) return;
          const chart = window.echarts.init(chartRef.current, null, { renderer: "canvas" });
          chart.setOption(option);
          if (onClick) {
            chart.on("click", onClick);
          }

          const onResize = () => chart.resize();
          window.addEventListener("resize", onResize);
          return () => {
            window.removeEventListener("resize", onResize);
            chart.dispose();
          };
        }, [option, onClick]);

        return <div ref={chartRef} style={{ height: height + "px", width: "100%" }} />;
      }

      function RechartsTooltip({ active, payload, label }) {
        if (!active || !payload || !payload.length) return null;
        return (
          <div className="rounded-xl border border-slate-200 dark:border-slate-700 bg-white/95 dark:bg-slate-900/95 px-3 py-2 shadow-soft">
            {label ? <p className="text-sm font-semibold mb-1">{label}</p> : null}
            <div className="space-y-1">
              {payload.map((entry) => (
                <div key={entry.name} className="flex items-center justify-between gap-4 text-xs">
                  <span style={{ color: entry.color }}>{entry.name}</span>
                  <span>{formatNumber(entry.value)}</span>
                </div>
              ))}
            </div>
          </div>
        );
      }

      function App() {
        const [activeTab, setActiveTab] = useState("overview");
        const [darkMode, setDarkMode] = useState(false);
        const [query, setQuery] = useState("");
        const [regionFilter, setRegionFilter] = useState("전체");
        const [projectFilter, setProjectFilter] = useState("전체");
        const [crossRegionFilter, setCrossRegionFilter] = useState("전체");
        const [crossLevelFilter, setCrossLevelFilter] = useState("전체");
        const [crossProjectFilter, setCrossProjectFilter] = useState("전체");
        const [crossSearchQuery, setCrossSearchQuery] = useState("");
        const [crossChartFilters, setCrossChartFilters] = useState({ region: null, schoolLevel: null, projectType: null });
        const [detailCriteria, setDetailCriteria] = useState(null);
        const [detailPage, setDetailPage] = useState(1);
        const [sortKey, setSortKey] = useState("id");
        const [sortDir, setSortDir] = useState("asc");
        const [page, setPage] = useState(1);
        const [networkWeights, setNetworkWeights] = useState(() => ({ ...DEFAULT_NETWORK_WEIGHTS }));

        useEffect(() => {
          document.documentElement.classList.toggle("dark", darkMode);
        }, [darkMode]);

        const totals = useMemo(() => {
          const officeBudget = REGIONAL_BUDGET.reduce((a, b) => a + b.officeBudget, 0);
          const directBudget = REGIONAL_BUDGET.reduce((a, b) => a + b.leadTotal + b.focusTotal, 0);
          const totalBudget = officeBudget + directBudget;
          const leadCount = REGIONAL_BUDGET.reduce((a, b) => a + b.leadCount, 0);
          const focusCount = REGIONAL_BUDGET.reduce((a, b) => a + b.focusCount, 0);
          return {
            officeBudget,
            directBudget,
            totalBudget,
            leadCount,
            focusCount,
            schoolCount: leadCount + focusCount,
            leadRatio: (leadCount / (leadCount + focusCount)) * 100,
            focusRatio: (focusCount / (leadCount + focusCount)) * 100,
          };
        }, []);

        const MOCK_DATA = useMemo(
          () => ({
            globalMetrics: {
              totalSchools: totals.schoolCount,
              directBudget: totals.directBudget,
              directBudgetApproxEok: 868.8,
              totalBudget: totals.totalBudget,
              leadSchools: totals.leadCount,
              focusSchools: totals.focusCount,
            },
            regionalData: REGIONAL_BUDGET,
            schoolLevelByRegion: SCHOOL_MATRIX,
          }),
          [totals]
        );

        const schoolRecords = useMemo(() => {
          const budgetByRegion = Object.fromEntries(REGIONAL_BUDGET.map((r) => [r.region, r]));
          return RAW_SCHOOL_RECORDS.map((row, index) => {
            const regionMeta = budgetByRegion[row.region];
            const avgSupport = row.projectType === "선도학교" ? regionMeta.leadAvg : regionMeta.focusAvg;
            const noise = 0.82 + pseudoRandom(hashCode(row.rid + "-" + row.schoolName)) * 0.36;
            return {
              id: index + 1,
              region: row.region,
              schoolLevel: row.schoolLevel,
              projectType: row.projectType,
              schoolName: row.schoolName,
              estimatedSupport: Math.round(avgSupport * noise),
            };
          });
        }, []);

        const regionList = useMemo(() => ["전체", ...REGIONAL_BUDGET.map((d) => d.region)], []);
        const crossLevelOptions = useMemo(
          () => [
            { value: "전체", label: "전체" },
            { value: "초등학교", label: "초" },
            { value: "중학교", label: "중" },
            { value: "고등학교", label: "고" },
            { value: "특수학교", label: "특수" },
          ],
          []
        );
        const crossProjectOptions = useMemo(
          () => [
            { value: "전체", label: "전체" },
            { value: "선도학교", label: "선도" },
            { value: "중점학교", label: "중점" },
          ],
          []
        );

        const applyCrossFilters = (rows, options = {}) => {
          const exclude = options.exclude || null;
          return rows.filter((row) => {
            const hitGlobalRegion = crossRegionFilter === "전체" || row.region === crossRegionFilter;
            const hitGlobalLevel = crossLevelFilter === "전체" || row.schoolLevel === crossLevelFilter;
            const hitGlobalProject = crossProjectFilter === "전체" || row.projectType === crossProjectFilter;
            const hitChartRegion = exclude === "region" || !crossChartFilters.region || row.region === crossChartFilters.region;
            const hitChartLevel = exclude === "schoolLevel" || !crossChartFilters.schoolLevel || row.schoolLevel === crossChartFilters.schoolLevel;
            const hitChartProject = exclude === "projectType" || !crossChartFilters.projectType || row.projectType === crossChartFilters.projectType;
            return hitGlobalRegion && hitGlobalLevel && hitGlobalProject && hitChartRegion && hitChartLevel && hitChartProject;
          });
        };

        const crossFilteredRows = useMemo(() => applyCrossFilters(schoolRecords), [
          schoolRecords,
          crossRegionFilter,
          crossLevelFilter,
          crossProjectFilter,
          crossChartFilters,
        ]);

        const crossTableRows = useMemo(() => {
          const q = crossSearchQuery.trim();
          if (!q) return crossFilteredRows;
          return crossFilteredRows.filter((row) => row.schoolName.includes(q));
        }, [crossFilteredRows, crossSearchQuery]);

        const crossSummary = useMemo(() => {
          const leadCount = crossFilteredRows.filter((row) => row.projectType === "선도학교").length;
          const focusCount = crossFilteredRows.filter((row) => row.projectType === "중점학교").length;
          return {
            totalCount: crossFilteredRows.length,
            leadCount,
            focusCount,
          };
        }, [crossFilteredRows]);

        const crossBarRows = useMemo(() => applyCrossFilters(schoolRecords, { exclude: "region" }), [
          schoolRecords,
          crossRegionFilter,
          crossLevelFilter,
          crossProjectFilter,
          crossChartFilters,
        ]);

        const crossLevelRows = useMemo(() => applyCrossFilters(schoolRecords, { exclude: "schoolLevel" }), [
          schoolRecords,
          crossRegionFilter,
          crossLevelFilter,
          crossProjectFilter,
          crossChartFilters,
        ]);

        const crossTypeRows = useMemo(() => applyCrossFilters(schoolRecords, { exclude: "projectType" }), [
          schoolRecords,
          crossRegionFilter,
          crossLevelFilter,
          crossProjectFilter,
          crossChartFilters,
        ]);

        const crossBarData = useMemo(
          () =>
            REGIONAL_BUDGET.map((meta) => {
              const rows = crossBarRows.filter((row) => row.region === meta.region);
              return {
                region: meta.region,
                선도학교: rows.filter((row) => row.projectType === "선도학교").length,
                중점학교: rows.filter((row) => row.projectType === "중점학교").length,
              };
            }),
          [crossBarRows]
        );

        const crossLevelData = useMemo(
          () =>
            LEVELS.map((level) => ({
              name: level,
              value: crossLevelRows.filter((row) => row.schoolLevel === level).length,
            })).filter((item) => item.value > 0),
          [crossLevelRows]
        );

        const crossTypeData = useMemo(
          () =>
            PROJECTS.map((project) => ({
              name: project,
              value: crossTypeRows.filter((row) => row.projectType === project).length,
            })).filter((item) => item.value > 0),
          [crossTypeRows]
        );

        const crossActiveTags = useMemo(() => {
          const tags = [];
          if (crossRegionFilter !== "전체") tags.push(`교육청: ${crossRegionFilter}`);
          if (crossLevelFilter !== "전체") tags.push(`학교급: ${crossLevelFilter}`);
          if (crossProjectFilter !== "전체") tags.push(`학교 종류: ${crossProjectFilter}`);
          if (crossChartFilters.region) tags.push(`차트-교육청: ${crossChartFilters.region}`);
          if (crossChartFilters.schoolLevel) tags.push(`차트-학교급: ${crossChartFilters.schoolLevel}`);
          if (crossChartFilters.projectType) tags.push(`차트-학교 종류: ${crossChartFilters.projectType}`);
          return tags;
        }, [crossRegionFilter, crossLevelFilter, crossProjectFilter, crossChartFilters]);

        const detailRows = useMemo(() => {
          if (!detailCriteria) return [];
          const rows = schoolRecords
            .filter((r) => r.region === detailCriteria.region)
            .filter((r) => r.schoolLevel === detailCriteria.schoolLevel)
            .filter((r) => !detailCriteria.projectType || r.projectType === detailCriteria.projectType)
            .sort((a, b) => a.schoolName.localeCompare(b.schoolName, "ko"));
          return rows;
        }, [detailCriteria, schoolRecords]);

        const detailTitle = useMemo(() => {
          if (!detailCriteria) return "";
          const projectText = detailCriteria.projectType ? ` / ${detailCriteria.projectType}` : " / 전체 사업유형";
          return `${detailCriteria.region} / ${detailCriteria.schoolLevel}${projectText}`;
        }, [detailCriteria]);

        useEffect(() => {
          setDetailPage(1);
        }, [detailCriteria]);

        const detailPageSize = 15;
        const detailPageCount = Math.max(1, Math.ceil(detailRows.length / detailPageSize));

        const pagedDetailRows = useMemo(() => {
          const start = (detailPage - 1) * detailPageSize;
          return detailRows.slice(start, start + detailPageSize);
        }, [detailRows, detailPage]);

        useEffect(() => {
          if (detailPage > detailPageCount) setDetailPage(1);
        }, [detailPage, detailPageCount]);

        const filteredRows = useMemo(() => {
          const q = query.trim();
          return schoolRecords.filter((row) => {
            const hitRegion = regionFilter === "전체" || row.region === regionFilter;
            const hitProject = projectFilter === "전체" || row.projectType === projectFilter;
            const hitQuery =
              !q || row.schoolName.includes(q) || row.region.includes(q) || row.schoolLevel.includes(q) || row.projectType.includes(q);
            return hitRegion && hitProject && hitQuery;
          });
        }, [schoolRecords, query, regionFilter, projectFilter]);

        const sortedRows = useMemo(() => {
          const rows = [...filteredRows];
          rows.sort((a, b) => {
            const av = a[sortKey];
            const bv = b[sortKey];
            if (typeof av === "number" && typeof bv === "number") {
              return sortDir === "asc" ? av - bv : bv - av;
            }
            const sa = String(av);
            const sb = String(bv);
            return sortDir === "asc" ? sa.localeCompare(sb, "ko") : sb.localeCompare(sa, "ko");
          });
          return rows;
        }, [filteredRows, sortKey, sortDir]);

        const handleSort = (key) => {
          if (sortKey === key) {
            setSortDir((d) => (d === "asc" ? "desc" : "asc"));
          } else {
            setSortKey(key);
            setSortDir("asc");
          }
          setPage(1);
        };

        const renderSortIcon = (key) => {
          if (sortKey !== key) return "↕";
          return sortDir === "asc" ? "▲" : "▼";
        };

        const pageSize = 20;
        const pageCount = Math.max(1, Math.ceil(sortedRows.length / pageSize));

        useEffect(() => {
          if (page > pageCount) setPage(1);
        }, [pageCount, page]);

        const pagedRows = useMemo(() => {
          const start = (page - 1) * pageSize;
          return sortedRows.slice(start, start + pageSize);
        }, [sortedRows, page]);

        const waterfallOption = useMemo(() => {
          const sorted = [...REGIONAL_BUDGET].sort((a, b) => b.totalBudget - a.totalBudget);
          const labels = sorted.map((d) => d.region);
          const values = sorted.map((d) => Number((d.totalBudget / 100000000).toFixed(1)));
          const base = [];
          let cumulative = 0;
          for (let i = 0; i < values.length; i++) {
            base.push(Number(cumulative.toFixed(1)));
            cumulative += values[i];
          }

          return {
            backgroundColor: "transparent",
            grid: { left: 50, right: 24, top: 36, bottom: 56 },
            tooltip: {
              trigger: "axis",
              axisPointer: { type: "shadow" },
              formatter: (params) => {
                const p = params.find((x) => x.seriesName === "기여 예산");
                if (!p) return "";
                return p.name + "<br/>" + p.seriesName + ": <b>" + p.value + "억</b>";
              },
            },
            xAxis: {
              type: "category",
              data: labels,
              axisLabel: { rotate: 25, color: darkMode ? "#cbd5e1" : "#334155" },
              axisLine: { lineStyle: { color: darkMode ? "#64748b" : "#94a3b8" } },
            },
            yAxis: {
              type: "value",
              name: "억 원",
              axisLabel: { color: darkMode ? "#cbd5e1" : "#334155" },
              splitLine: { lineStyle: { color: darkMode ? "rgba(148,163,184,0.2)" : "rgba(148,163,184,0.35)" } },
            },
            series: [
              {
                name: "누적기준",
                type: "bar",
                stack: "total",
                itemStyle: { color: "transparent", borderColor: "transparent" },
                emphasis: { itemStyle: { color: "transparent" } },
                data: base,
              },
              {
                name: "기여 예산",
                type: "bar",
                stack: "total",
                data: values,
                itemStyle: {
                  borderRadius: [6, 6, 0, 0],
                  color: darkMode ? "#38bdf8" : "#0ea5e9",
                },
              },
            ],
          };
        }, [darkMode]);

        const treemapOption = useMemo(() => {
          const treeData = REGIONAL_BUDGET.map((r) => {
            const lv = SCHOOL_MATRIX[r.region];
            return {
              name: r.region,
              value: r.totalSchools,
              children: LEVELS.map((k) => ({
                name: LEVEL_SHORT[k],
                value: lv[k].선도학교 + lv[k].중점학교,
              })),
            };
          });

          return {
            tooltip: {
              formatter: (info) => {
                const treePath = info.treePathInfo.map((p) => p.name).filter(Boolean).join(" > ");
                return treePath + "<br/><b>" + formatNumber(info.value) + "개교</b>";
              },
            },
            series: [
              {
                type: "treemap",
                roam: false,
                breadcrumb: { show: false },
                nodeClick: false,
                label: { color: darkMode ? "#e2e8f0" : "#0f172a", fontWeight: 700 },
                upperLabel: { show: true, color: darkMode ? "#cbd5e1" : "#1e293b", height: 22 },
                itemStyle: {
                  borderColor: darkMode ? "#0f172a" : "#f8fafc",
                  borderWidth: 2,
                  gapWidth: 2,
                },
                levels: [
                  { color: ["#0369a1", "#0891b2", "#0d9488", "#15803d", "#ca8a04", "#ea580c"] },
                  { colorSaturation: [0.35, 0.8], itemStyle: { borderColorSaturation: 0.6, gapWidth: 1 } },
                ],
                data: treeData,
              },
            ],
          };
        }, [darkMode]);

        const bubbleOption = useMemo(() => {
          const meanX = REGIONAL_BUDGET.reduce((a, b) => a + b.avgPerSchool, 0) / REGIONAL_BUDGET.length / 10000;
          const meanY = REGIONAL_BUDGET.reduce((a, b) => a + b.totalSchools, 0) / REGIONAL_BUDGET.length;

          const data = REGIONAL_BUDGET.map((r) => [
            Number((r.avgPerSchool / 10000).toFixed(1)),
            r.totalSchools,
            Number((r.totalBudget / 100000000).toFixed(1)),
            r.region,
          ]);

          return {
            grid: { left: 58, right: 20, top: 36, bottom: 56 },
            tooltip: {
              formatter: (params) => {
                const d = params.data;
                return [
                  "<b>" + d[3] + "</b>",
                  "교당 평균 지원액: " + d[0] + "만원",
                  "선정 학교 수: " + formatNumber(d[1]) + "개교",
                  "총 지원액: " + d[2] + "억",
                ].join("<br/>");
              },
            },
            xAxis: {
              name: "교당 평균 지원액 (만원)",
              nameLocation: "middle",
              nameGap: 35,
              splitLine: { lineStyle: { color: darkMode ? "rgba(148,163,184,0.2)" : "rgba(148,163,184,0.3)" } },
              axisLabel: { color: darkMode ? "#cbd5e1" : "#334155" },
            },
            yAxis: {
              name: "선정 학교 수",
              nameGap: 22,
              splitLine: { lineStyle: { color: darkMode ? "rgba(148,163,184,0.2)" : "rgba(148,163,184,0.3)" } },
              axisLabel: { color: darkMode ? "#cbd5e1" : "#334155" },
            },
            series: [
              {
                type: "scatter",
                data,
                symbolSize: (val) => Math.max(12, Math.sqrt(val[2]) * 2.6),
                itemStyle: {
                  color: darkMode ? "rgba(56,189,248,0.85)" : "rgba(2,132,199,0.85)",
                  borderColor: darkMode ? "#bae6fd" : "#0369a1",
                  borderWidth: 1.5,
                },
              },
            ],
            markLine: {
              silent: true,
              lineStyle: { type: "dashed", color: darkMode ? "#94a3b8" : "#64748b" },
              data: [{ xAxis: meanX }, { yAxis: meanY }],
            },
          };
        }, [darkMode]);

        const heatmapOption = useMemo(() => {
          const xAxis = HEATMAP_COLUMNS.map((c) => c.label);
          const yAxis = REGIONAL_BUDGET.map((r) => r.region);
          const data = [];

          REGIONAL_BUDGET.forEach((r, y) => {
            const m = SCHOOL_MATRIX[r.region];
            const values = [
              m.초등학교.선도학교,
              m.초등학교.중점학교,
              m.중학교.선도학교,
              m.중학교.중점학교,
              m.고등학교.선도학교,
              m.고등학교.중점학교,
              m.특수학교.선도학교,
              m.특수학교.중점학교,
            ];
            values.forEach((v, x) => data.push([x, y, v]));
          });

          const maxV = Math.max(...data.map((d) => d[2]));

          return {
            grid: { left: 70, right: 30, top: 24, bottom: 68 },
            tooltip: {
              position: "top",
              formatter: (p) => yAxis[p.data[1]] + " / " + xAxis[p.data[0]] + "<br/><b>" + p.data[2] + "개교</b>",
            },
            xAxis: {
              type: "category",
              data: xAxis,
              axisLabel: { color: darkMode ? "#cbd5e1" : "#334155", rotate: 25 },
            },
            yAxis: {
              type: "category",
              data: yAxis,
              axisLabel: { color: darkMode ? "#cbd5e1" : "#334155" },
            },
            visualMap: {
              min: 0,
              max: maxV,
              calculable: true,
              orient: "horizontal",
              left: "center",
              bottom: 8,
              inRange: { color: darkMode ? ["#334155", "#22d3ee", "#facc15"] : ["#e2e8f0", "#7dd3fc", "#0369a1"] },
              textStyle: { color: darkMode ? "#cbd5e1" : "#334155" },
            },
            series: [
              {
                type: "heatmap",
                data,
                label: {
                  show: true,
                  fontSize: 10,
                  color: darkMode ? "#ffffff" : "#000000",
                },
                emphasis: {
                  itemStyle: {
                    borderColor: darkMode ? "#f8fafc" : "#0f172a",
                    borderWidth: 1,
                  },
                },
              },
            ],
          };
        }, [darkMode]);

        const networkWeightSummary = useMemo(() => {
          const total = NETWORK_WEIGHT_FIELDS.reduce((sum, field) => sum + Number(networkWeights[field.key] || 0), 0);
          const effectiveWeights = total > 0 ? networkWeights : DEFAULT_NETWORK_WEIGHTS;
          const divisor = total > 0 ? total : NETWORK_WEIGHT_FIELDS.reduce((sum, field) => sum + DEFAULT_NETWORK_WEIGHTS[field.key], 0);
          const normalized = NETWORK_WEIGHT_FIELDS.reduce((acc, field) => {
            acc[field.key] = Number(effectiveWeights[field.key] || 0) / divisor;
            return acc;
          }, {});
          const labels = NETWORK_WEIGHT_FIELDS.map((field) => `${field.label}(${Number(networkWeights[field.key] || 0)}%)`);
          return { total, normalized, labels, isFallback: total <= 0 };
        }, [networkWeights]);

        const networkOption = useMemo(() => {
          const maxAvg = Math.max(...REGIONAL_BUDGET.map((r) => r.avgPerSchool));
          const vectors = REGIONAL_BUDGET.map((r) => {
            const m = SCHOOL_MATRIX[r.region];
            const elementary = m.초등학교.선도학교 + m.초등학교.중점학교;
            const leadRatio = r.leadCount / r.totalSchools;
            const officeRatio = r.officeBudget / r.totalBudget;
            const elementaryRatio = elementary / r.totalSchools;
            return {
              region: r.region,
              totalSchools: r.totalSchools,
              totalBudget: r.totalBudget,
              avgPerSchool: r.avgPerSchool,
              leadRatio,
              officeRatio,
              elementaryRatio,
              vector: [r.avgPerSchool / maxAvg, leadRatio, officeRatio, elementaryRatio],
            };
          });

          const pairs = [];
          for (let i = 0; i < vectors.length; i++) {
            for (let j = i + 1; j < vectors.length; j++) {
              const a = vectors[i].vector;
              const b = vectors[j].vector;
              const dist = Math.sqrt(
                Math.pow(a[0] - b[0], 2) * networkWeightSummary.normalized.avgPerSchool +
                  Math.pow(a[1] - b[1], 2) * networkWeightSummary.normalized.leadRatio +
                  Math.pow(a[2] - b[2], 2) * networkWeightSummary.normalized.officeRatio +
                  Math.pow(a[3] - b[3], 2) * networkWeightSummary.normalized.elementaryRatio
              );
              const score = Math.max(0, 1 - dist);
              pairs.push({ source: vectors[i].region, target: vectors[j].region, score });
            }
          }

          pairs.sort((a, b) => b.score - a.score);
          const degree = {};
          const links = [];
          pairs.forEach((p) => {
            degree[p.source] = degree[p.source] || 0;
            degree[p.target] = degree[p.target] || 0;
            if (p.score < 0.76) return;
            if (degree[p.source] >= 5 || degree[p.target] >= 5) return;
            degree[p.source] += 1;
            degree[p.target] += 1;
            links.push({ source: p.source, target: p.target, value: Number(p.score.toFixed(2)) });
          });

          const maxBudget = Math.max(...vectors.map((v) => v.totalBudget));
          const nodes = vectors.map((v) => ({
            id: v.region,
            name: v.region,
            value: v.totalBudget,
            symbolSize: 18 + (v.totalBudget / maxBudget) * 24,
            category: v.avgPerSchool > 35000000 ? 1 : 0,
          }));

          return {
            tooltip: {
              formatter: (p) => {
                if (p.dataType === "edge") {
                  return p.data.source + " ↔ " + p.data.target + "<br/>유사도: <b>" + p.data.value + "</b>";
                }
                const r = REGIONAL_BUDGET.find((x) => x.region === p.data.name);
                return [
                  "<b>" + p.data.name + "</b>",
                  "총 지원액: " + formatWonToEok(r.totalBudget),
                  "교당 평균: " + formatWon(r.avgPerSchool),
                  "학교 수: " + formatNumber(r.totalSchools) + "개교",
                ].join("<br/>");
              },
            },
            legend: {
              data: ["확산형", "집중형"],
              textStyle: { color: darkMode ? "#cbd5e1" : "#334155" },
            },
            series: [
              {
                type: "graph",
                layout: "force",
                roam: true,
                draggable: true,
                force: { repulsion: 350, edgeLength: [80, 170] },
                label: { show: true, color: darkMode ? "#f8fafc" : "#0f172a", fontWeight: 600 },
                categories: [{ name: "확산형" }, { name: "집중형" }],
                data: nodes,
                links,

                  <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between mt-4 gap-2 no-print">
                    <p className="text-sm text-slate-600 dark:text-slate-300">
                      필터 결과 <b>{formatNumber(filteredRows.length)}</b>건 / {formatNumber(schoolRecords.length)}건
                    </p>
                    <div className="flex items-center gap-2">
                      <button
                        className="px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-600 text-sm disabled:opacity-40"
                        onClick={() => setPage((p) => Math.max(1, p - 1))}
                        disabled={page === 1}
                      >
                        이전
                      </button>
                      <span className="text-sm px-2">{page} / {pageCount}</span>
                      <button
                        className="px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-600 text-sm disabled:opacity-40"
                        onClick={() => setPage((p) => Math.min(pageCount, p + 1))}
                        disabled={page === pageCount}
                      >
                        다음
                      </button>
                    </div>
                  </div>
                </section>
              )}
            </section>
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
